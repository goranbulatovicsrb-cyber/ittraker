name: 🔨 Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version:  '6.7.0'
          host:     'windows'
          target:   'desktop'
          arch:     'win64_msvc2019_64'
          modules:  'qtcharts'
          cache:    false

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64

      - name: Configure CMake
        run: cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt (windeployqt)
        run: |
          $qtDir = "${{ env.Qt6_DIR }}"
          Write-Host "Qt6_DIR = $qtDir"
          $windeployqt = Get-ChildItem -Path "D:\a\ittraker\Qt" -Recurse -Filter "windeployqt.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $windeployqt) {
            $windeployqt = Get-ChildItem -Path "D:\" -Recurse -Filter "windeployqt.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($windeployqt) {
            Write-Host "Found windeployqt at: $($windeployqt.FullName)"
            & $windeployqt.FullName --release --no-translations "build\bin\ITTracker.exe"
          } else {
            Write-Host "windeployqt not found, skipping..."
          }

      - name: Create ZIP package
        run: Compress-Archive -Path "build\bin\*" -DestinationPath "ITTracker-Windows-x64.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name:           ITTracker-Windows-x64
          path:           ITTracker-Windows-x64.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: ITTracker-Windows-x64.zip
          generate_release_notes: true
          name: "IT Tracker ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
