name: 🔨 Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Install Qt ────────────────────────────────────────────────────────
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version:  '6.7.0'
          host:     'windows'
          target:   'desktop'
          arch:     'win64_msvc2019_64'
          modules:  'qtcharts qtprintsupport'
          cache:    true

      # ── 3. Setup MSVC ────────────────────────────────────────────────────────
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── 4. Configure CMake ───────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -B build ^
            -G "NMake Makefiles" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      # ── 5. Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release

      # ── 6. Deploy Qt DLLs ────────────────────────────────────────────────────
      - name: Deploy Qt (windeployqt)
        run: |
          $qtBin = "${{ env.Qt6_DIR }}\bin"
          $exePath = "build\bin\ITTracker.exe"
          & "$qtBin\windeployqt.exe" --release --no-translations $exePath

      # ── 7. Package ───────────────────────────────────────────────────────────
      - name: Create ZIP package
        run: |
          Compress-Archive -Path "build\bin\*" -DestinationPath "ITTracker-Windows-x64.zip"

      # ── 8. Upload as artifact ─────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name:             ITTracker-Windows-x64
          path:             ITTracker-Windows-x64.zip
          retention-days:   30

      # ── 9. Create GitHub Release (only on version tags) ───────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ITTracker-Windows-x64.zip
          generate_release_notes: true
          name: "IT Tracker ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
