name: 🔨 Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version:  '6.7.0'
          host:     'windows'
          target:   'desktop'
          arch:     'win64_msvc2019_64'
          modules:  'qtcharts'
          cache:    true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt (windeployqt)
        run: |
          $exePath = "build\bin\ITTracker.exe"
          $qtBin = "${{ env.Qt6_DIR }}\bin"
          & "$qtBin\windeployqt.exe" --release --no-translations $exePath

      - name: Create ZIP package
        run: Compress-Archive -Path "build\bin\*" -DestinationPath "ITTracker-Windows-x64.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name:           ITTracker-Windows-x64
          path:           ITTracker-Windows-x64.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ITTracker-Windows-x64.zip
          generate_release_notes: true
          name: "IT Tracker ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
